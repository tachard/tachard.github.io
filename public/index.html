<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Thomas Achard Portfolio made with React"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM"
      crossorigin="anonymous"
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/icon.png" />
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <title>Thomas Achard</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <!--
      This HTML file is a template.
      If you open it directly in the browser, you will see an empty page.

      You can add webfonts, meta tags, or analytics to this file.
      The build step will place the bundled scripts into the <body> tag.

      To begin the development, run `npm start` or `yarn start`.
      To create a production bundle, use `npm run build` or `yarn build`.
    -->
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const cards = document.querySelectorAll(".card");
        const cardTitles = document.querySelectorAll(".card-title");
        const cardTexts = document.querySelectorAll(".card-text");
        const cardStacks = document.querySelectorAll(".hstack");

        let maxCardHeight = 0;
        let maxCardTitleHeight = 0;
        let maxCardTextHeight = 0;
        let maxCardStackHeight = 0;

        // Cards
        cards.forEach((card) => {
          const cardHeight = card.offsetHeight;
          maxCardHeight = Math.max(maxCardHeight, cardHeight);
        });

        cards.forEach((card) => {
          card.style.height = `${maxCardHeight}px`;
        });

        // Card titles
        cardTitles.forEach((cardTitle) => {
          const cardTitleHeight = cardTitle.offsetHeight;
          maxCardTitleHeight = Math.max(maxCardTitleHeight, cardTitleHeight);
        });

        cardTitles.forEach((cardTitle) => {
          cardTitle.style.height = `${maxCardTitleHeight}px`;
        });

        // Card texts
        cardTexts.forEach((cardText) => {
          const cardTextHeight = cardText.offsetHeight;
          maxCardTextHeight = Math.max(maxCardTextHeight, cardTextHeight);
        });

        cardTexts.forEach((cardText) => {
          cardText.style.height = `${maxCardTextHeight}px`;
        });

        // Card badges
        cardStacks.forEach((cardStack) => {
          const cardStackHeight = cardStack.offsetHeight;
          maxCardStackHeight = Math.max(maxCardStackHeight, cardStackHeight);
        });

        cardStacks.forEach((cardStack) => {
          cardStack.style.height = `${maxCardStackHeight}px`;
        });
      });
    </script>
  </body>
</html>
